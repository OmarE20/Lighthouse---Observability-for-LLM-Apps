services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LIGHTHOUSE_DATABASE_URL=${LIGHTHOUSE_DATABASE_URL:-sqlite:///./lighthouse.db}
      - LIGHTHOUSE_CORS_ORIGINS=http://localhost:5173
    volumes:
      - lighthouse-data:/app/data

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  lighthouse-data:
